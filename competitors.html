<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ конкурентов — SaaS Аналитика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1a1a2e', 900: '#0f0f1a', 700: '#252540' },
                        wb: { 500: '#a855f7', 600: '#9333ea', 400: '#c084fc' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f1a; }
        .nav-link.active { border-bottom: 2px solid #a855f7; color: #c084fc; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #252540 25%, #2a2a45 50%, #252540 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen text-gray-100">
    <!-- Navigation -->
    <nav class="bg-dark-800 border-b border-gray-700/50 sticky top-0 z-50 backdrop-blur-sm bg-opacity-90">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <span class="text-lg font-bold text-wb-400">WB Analytics</span>
                <div class="flex gap-1 sm:gap-4">
                    <a href="index.html" class="nav-link px-3 py-4 text-sm sm:text-base text-gray-400 hover:text-wb-400 transition">Калькулятор</a>
                    <a href="ai-forecast.html" class="nav-link px-3 py-4 text-sm sm:text-base text-gray-400 hover:text-wb-400 transition">AI-прогноз</a>
                    <a href="competitors.html" class="nav-link active px-3 py-4 text-sm sm:text-base hover:text-wb-400 transition">Конкуренты</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <h1 class="text-2xl sm:text-3xl font-bold mb-2">Анализ конкурентов</h1>
        <p class="text-gray-400 mb-8">Исследуйте нишу и найдите возможности для входа</p>

        <!-- Search -->
        <div class="bg-dark-800 rounded-2xl p-6 border border-gray-700/50 mb-8">
            <label class="block text-sm text-gray-400 mb-1">Поисковый запрос (товар или ниша)</label>
            <div class="flex gap-3">
                <input type="text" id="searchQuery" placeholder="Например: термокружка, фитнес-браслет, чехол iPhone" class="flex-1 bg-dark-900 border border-gray-700 rounded-lg px-4 py-3 focus:border-wb-500 focus:outline-none transition">
                <button id="searchBtn" onclick="analyzeCompetitors()" class="bg-wb-500 hover:bg-wb-600 text-white font-semibold px-6 py-3 rounded-lg transition whitespace-nowrap">
                    Анализ
                </button>
            </div>
        </div>

        <!-- Competitor cards -->
        <div id="competitorCards" class="hidden mb-8">
            <h2 class="text-xl font-semibold mb-4 text-wb-400">Конкуренты в нише</h2>
            <div id="cardsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- AI Analysis skeleton -->
        <div id="aiSkeleton" class="hidden space-y-4">
            <h2 class="text-xl font-semibold mb-4 text-wb-400">AI-анализ ниши</h2>
            <div class="skeleton h-16"></div>
            <div class="skeleton h-24"></div>
            <div class="skeleton h-16"></div>
            <div class="skeleton h-16"></div>
        </div>

        <!-- AI Analysis results -->
        <div id="aiResults" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-wb-400">AI-анализ ниши</h2>
            <div class="grid sm:grid-cols-2 gap-4">
                <div class="bg-dark-800 rounded-xl p-5 border border-gray-700/50">
                    <div class="text-sm text-gray-400 mb-1">Средняя цена по нише</div>
                    <div id="avgPriceResult" class="text-2xl font-bold text-wb-400">—</div>
                </div>
                <div class="bg-dark-800 rounded-xl p-5 border border-gray-700/50">
                    <div class="text-sm text-gray-400 mb-1">Оптимальная цена для входа</div>
                    <div id="optimalPrice" class="text-2xl font-bold text-green-400">—</div>
                </div>
            </div>
            <div class="mt-4 bg-dark-800 rounded-xl p-5 border border-gray-700/50">
                <div class="text-sm text-gray-400 mb-2">Незанятые ниши</div>
                <div id="freeNiches" class="text-gray-300"></div>
            </div>
            <div class="mt-4 bg-dark-800 rounded-xl p-5 border border-green-500/20">
                <div class="text-sm text-gray-400 mb-2">Рекомендация по входу</div>
                <div id="recommendation" class="text-gray-300"></div>
            </div>
        </div>

        <!-- Error -->
        <div id="errorBlock" class="hidden bg-red-500/10 border border-red-500/30 rounded-2xl p-6 text-red-300"></div>
    </main>

    <script>
        const DS_API_KEY = 'ВСТАВЬ_СВОЙ_КЛЮЧ';

        // Demo competitor data generator
        function generateCompetitors(query) {
            const templates = [
                { suffix: 'Premium', priceRange: [2500, 5000], ratingRange: [4.5, 4.9], reviewsRange: [500, 3000], salesRange: [200, 800], badge: 'Топ' },
                { suffix: 'Pro Max', priceRange: [1800, 3500], ratingRange: [4.3, 4.8], reviewsRange: [1000, 5000], salesRange: [500, 1500], badge: 'Топ' },
                { suffix: 'Lite', priceRange: [800, 1500], ratingRange: [4.0, 4.5], reviewsRange: [200, 1500], salesRange: [300, 1000], badge: 'Новинка' },
                { suffix: 'Classic', priceRange: [1200, 2500], ratingRange: [4.2, 4.7], reviewsRange: [800, 4000], salesRange: [400, 1200], badge: 'Топ' },
                { suffix: 'Budget', priceRange: [500, 1200], ratingRange: [3.8, 4.3], reviewsRange: [100, 800], salesRange: [100, 500], badge: 'Падение' },
                { suffix: 'New Edition', priceRange: [1500, 3000], ratingRange: [4.0, 4.6], reviewsRange: [50, 300], salesRange: [50, 200], badge: 'Новинка' },
            ];

            return templates.map(t => {
                const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                const randF = (min, max) => (Math.random() * (max - min) + min).toFixed(1);
                return {
                    name: `${query} ${t.suffix}`,
                    price: rand(t.priceRange[0], t.priceRange[1]),
                    rating: parseFloat(randF(t.ratingRange[0], t.ratingRange[1])),
                    reviews: rand(t.reviewsRange[0], t.reviewsRange[1]),
                    sales: rand(t.salesRange[0], t.salesRange[1]),
                    badge: t.badge
                };
            });
        }

        function renderStars(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5 ? 1 : 0;
            const empty = 5 - full - half;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
        }

        function renderCompetitorCards(competitors) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';

            competitors.forEach(c => {
                const badgeColor = c.badge === 'Топ' ? 'bg-green-500/20 text-green-400' :
                                   c.badge === 'Новинка' ? 'bg-blue-500/20 text-blue-400' :
                                   'bg-red-500/20 text-red-400';

                const card = document.createElement('div');
                card.className = 'bg-dark-800 rounded-xl p-5 border border-gray-700/50 hover:border-wb-500/50 transition';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-semibold text-white text-sm leading-tight pr-2">${c.name}</h3>
                        <span class="text-xs px-2 py-1 rounded-full ${badgeColor} whitespace-nowrap">${c.badge}</span>
                    </div>
                    <div class="text-2xl font-bold text-wb-400 mb-3">${c.price.toLocaleString('ru-RU')} ₽</div>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-400">Рейтинг</span>
                            <span class="text-yellow-400">${renderStars(c.rating)} ${c.rating}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">Отзывы</span>
                            <span class="text-white">${c.reviews.toLocaleString('ru-RU')}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">Продажи / мес.</span>
                            <span class="text-green-400 font-medium">~${c.sales.toLocaleString('ru-RU')} шт</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('competitorCards').classList.remove('hidden');
        }

        async function analyzeCompetitors() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) {
                showError('Введите поисковый запрос');
                return;
            }

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = 'Анализ...';
            btn.classList.add('opacity-50');

            document.getElementById('errorBlock').classList.add('hidden');
            document.getElementById('aiResults').classList.add('hidden');

            // Instantly render demo competitor cards
            const competitors = generateCompetitors(query);
            renderCompetitorCards(competitors);

            // Show AI skeleton and start API request
            document.getElementById('aiSkeleton').classList.remove('hidden');

            const competitorsSummary = competitors.map(c =>
                `${c.name}: ${c.price}₽, рейтинг ${c.rating}, ${c.reviews} отзывов, ~${c.sales} продаж/мес, статус: ${c.badge}`
            ).join('\n');

            const systemPrompt = `Ты опытный аналитик Wildberries с 5 годами опыта.
Отвечай строго в JSON формате.`;

            const userPrompt = `Проанализируй конкурентную среду на Wildberries для запроса: "${query}"

Данные по конкурентам:
${competitorsSummary}

Ответь строго в JSON:
{
  "avg_price": число,
  "optimal_price": число,
  "free_niches": ["ниша 1", "ниша 2", "ниша 3"],
  "recommendation": "подробная рекомендация по входу в нишу (2-4 предложения)"
}

Все числа — целые. Рекомендация должна быть конкретной и полезной.`;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DS_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        temperature: 0.4,
                        response_format: { type: 'json_object' },
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ]
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `Ошибка API: ${response.status}`);
                }

                const data = await response.json();
                const analysis = JSON.parse(data.choices[0].message.content);
                renderAIAnalysis(analysis);
            } catch (err) {
                showError('Ошибка AI-анализа: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Анализ';
                btn.classList.remove('opacity-50');
                document.getElementById('aiSkeleton').classList.add('hidden');
            }
        }

        function renderAIAnalysis(data) {
            document.getElementById('avgPriceResult').textContent = (data.avg_price || 0).toLocaleString('ru-RU') + ' ₽';
            document.getElementById('optimalPrice').textContent = (data.optimal_price || 0).toLocaleString('ru-RU') + ' ₽';

            const niches = data.free_niches || [];
            document.getElementById('freeNiches').innerHTML = niches.map(n =>
                `<span class="inline-block bg-wb-500/10 text-wb-400 px-3 py-1 rounded-full text-sm mr-2 mb-2">${n}</span>`
            ).join('');

            document.getElementById('recommendation').textContent = data.recommendation || '—';

            document.getElementById('aiResults').classList.remove('hidden');
        }

        function showError(msg) {
            const el = document.getElementById('errorBlock');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // Enter key support
        document.getElementById('searchQuery').addEventListener('keydown', e => {
            if (e.key === 'Enter') analyzeCompetitors();
        });
    </script>
</body>
</html>
