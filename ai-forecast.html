<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-прогноз продаж — SaaS Аналитика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#1a1a2e', 900: '#0f0f1a', 700: '#252540' },
                        wb: { 500: '#a855f7', 600: '#9333ea', 400: '#c084fc' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f1a; }
        input[type="number"] { -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .nav-link.active { border-bottom: 2px solid #a855f7; color: #c084fc; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #252540 25%, #2a2a45 50%, #252540 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen text-gray-100">
    <!-- Navigation -->
    <nav class="bg-[#1a1a2e] border-b border-gray-700/50 sticky top-0 z-50 backdrop-blur-sm bg-opacity-90">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <span class="text-lg font-bold text-[#c084fc]">WB Analytics</span>
                <div class="flex gap-1 sm:gap-4">
                    <a href="index.html" class="nav-link px-3 py-4 text-sm sm:text-base text-gray-400 hover:text-[#c084fc] transition">Калькулятор</a>
                    <a href="ai-forecast.html" class="nav-link active px-3 py-4 text-sm sm:text-base hover:text-[#c084fc] transition">AI-прогноз</a>
                    <a href="competitors.html" class="nav-link px-3 py-4 text-sm sm:text-base text-gray-400 hover:text-[#c084fc] transition">Конкуренты</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <h1 class="text-2xl sm:text-3xl font-bold mb-2">AI-прогноз продаж</h1>
        <p class="text-gray-400 mb-8">Прогноз на 12 месяцев с учётом сезонности и трендов</p>

        <!-- Input form -->
        <div class="bg-[#1a1a2e] rounded-2xl p-6 border border-gray-700/50 mb-8">
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Название товара / ниша</label>
                    <input type="text" id="productName" placeholder="Например: термокружка" class="w-full bg-[#0f0f1a] border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-[#a855f7] focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Текущие продажи (шт./мес.)</label>
                    <input type="number" id="currentSales" value="100" min="0" class="w-full bg-[#0f0f1a] border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-[#a855f7] focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Средняя цена (₽)</label>
                    <input type="number" id="avgPrice" value="2000" min="0" class="w-full bg-[#0f0f1a] border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-[#a855f7] focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Категория товара</label>
                    <select id="category" class="w-full bg-[#0f0f1a] border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-[#a855f7] focus:outline-none transition">
                        <option value="одежда">Одежда</option>
                        <option value="электроника">Электроника</option>
                        <option value="косметика">Косметика</option>
                        <option value="товары для дома" selected>Товары для дома</option>
                        <option value="спорт">Спорт</option>
                        <option value="другое">Другое</option>
                    </select>
                </div>
            </div>
            <button id="forecastBtn" onclick="getForecast()" class="mt-6 bg-[#a855f7] hover:bg-[#9333ea] text-white font-semibold px-8 py-3 rounded-lg transition w-full sm:w-auto cursor-pointer">
                Получить прогноз
            </button>
        </div>

        <!-- Skeleton loader -->
        <div id="skeletonLoader" class="hidden space-y-6">
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="skeleton h-32"></div>
                <div class="skeleton h-32"></div>
                <div class="skeleton h-32"></div>
                <div class="skeleton h-32"></div>
                <div class="skeleton h-32"></div>
                <div class="skeleton h-32"></div>
            </div>
            <div class="skeleton h-40"></div>
            <div class="skeleton h-40"></div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden space-y-8">
            <!-- Monthly forecast -->
            <div>
                <h2 class="text-xl font-semibold mb-4 text-[#c084fc]">Прогноз по месяцам</h2>
                <div id="monthsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </div>

            <!-- Best month -->
            <div id="bestMonthBlock" class="bg-[#1a1a2e] rounded-2xl p-6 border border-green-500/30">
                <h2 class="text-xl font-semibold mb-3 text-green-400">Лучший месяц</h2>
                <div id="bestMonthContent"></div>
            </div>

            <!-- Risks & Tips -->
            <div class="grid sm:grid-cols-2 gap-6">
                <div class="bg-[#1a1a2e] rounded-2xl p-6 border border-red-500/20">
                    <h2 class="text-xl font-semibold mb-4 text-red-400">Риски</h2>
                    <ul id="risksList" class="space-y-2"></ul>
                </div>
                <div class="bg-[#1a1a2e] rounded-2xl p-6 border border-blue-500/20">
                    <h2 class="text-xl font-semibold mb-4 text-blue-400">Советы</h2>
                    <ul id="tipsList" class="space-y-2"></ul>
                </div>
            </div>
        </div>

        <!-- Error -->
        <div id="errorBlock" class="hidden bg-red-500/10 border border-red-500/30 rounded-2xl p-6 text-red-300"></div>
    </main>

    <script>
        const DS_API_KEY = 'ВСТАВЬ_СВОЙ_КЛЮЧ';

        async function getForecast() {
            const productName = document.getElementById('productName').value.trim();
            const currentSales = document.getElementById('currentSales').value;
            const avgPrice = document.getElementById('avgPrice').value;
            const category = document.getElementById('category').value;

            if (!productName) {
                showError('Введите название товара или нишу');
                return;
            }

            const btn = document.getElementById('forecastBtn');
            btn.disabled = true;
            btn.textContent = 'Анализирую...';
            btn.classList.add('opacity-50');

            document.getElementById('results').classList.add('hidden');
            document.getElementById('errorBlock').classList.add('hidden');
            document.getElementById('skeletonLoader').classList.remove('hidden');

            const systemPrompt = `Ты опытный аналитик Wildberries с 5 годами опыта.
Отвечай строго в JSON формате.
Учитывай сезонность и праздничные пики продаж:
- Февраль: 14 февраля (День святого Валентина)
- Март: 8 марта (Международный женский день)
- Май: 9 мая (День Победы)
- Ноябрь: Чёрная пятница
- Декабрь: Новый год
Прогноз должен начинаться с текущего месяца и охватывать 12 месяцев.`;

            const userPrompt = `Сделай прогноз продаж на 12 месяцев для товара на Wildberries.

Товар: ${productName}
Категория: ${category}
Текущие продажи: ${currentSales} шт/мес
Средняя цена: ${avgPrice} руб

Ответь строго в JSON:
{
  "months": [
    { "month": "Название месяца Год", "units": число, "revenue": число, "confidence": число_от_0_до_100, "note": "краткий комментарий" }
  ],
  "best_month": { "month": "Название месяца Год", "reason": "почему" },
  "risks": ["риск 1", "риск 2", "риск 3"],
  "tips": ["совет 1", "совет 2", "совет 3"]
}

В массиве months должно быть ровно 12 объектов. Все числа — целые.`;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DS_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        temperature: 0.4,
                        response_format: { type: 'json_object' },
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ]
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `Ошибка API: ${response.status}`);
                }

                const data = await response.json();
                const forecast = JSON.parse(data.choices[0].message.content);
                renderForecast(forecast);
            } catch (err) {
                showError('Ошибка: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Получить прогноз';
                btn.classList.remove('opacity-50');
                document.getElementById('skeletonLoader').classList.add('hidden');
            }
        }

        function renderForecast(data) {
            const grid = document.getElementById('monthsGrid');
            grid.innerHTML = '';

            data.months.forEach(m => {
                const confColor = m.confidence >= 80 ? 'text-green-400' : m.confidence >= 60 ? 'text-yellow-400' : 'text-red-400';
                const confBg = m.confidence >= 80 ? 'bg-green-500' : m.confidence >= 60 ? 'bg-yellow-500' : 'bg-red-500';

                const card = document.createElement('div');
                card.className = 'bg-[#1a1a2e] rounded-xl p-5 border border-gray-700/50 hover:border-[#a855f7]/50 transition';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-semibold text-white">${m.month}</h3>
                        <span class="${confColor} text-sm font-medium">${m.confidence}%</span>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">Продажи</span>
                            <span class="text-white font-medium">${m.units.toLocaleString('ru-RU')} шт</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">Выручка</span>
                            <span class="text-[#c084fc] font-medium">${m.revenue.toLocaleString('ru-RU')} \u20BD</span>
                        </div>
                    </div>
                    <div class="mt-3 w-full bg-[#0f0f1a] rounded-full h-1.5">
                        <div class="${confBg} h-1.5 rounded-full transition-all" style="width:${m.confidence}%"></div>
                    </div>
                    ${m.note ? `<p class="text-xs text-gray-500 mt-2">${m.note}</p>` : ''}
                `;
                grid.appendChild(card);
            });

            if (data.best_month) {
                document.getElementById('bestMonthContent').innerHTML = `
                    <div class="text-2xl font-bold text-white mb-1">${data.best_month.month}</div>
                    <p class="text-gray-300">${data.best_month.reason}</p>
                `;
            }

            const risksList = document.getElementById('risksList');
            risksList.innerHTML = '';
            (data.risks || []).forEach(r => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2 text-gray-300';
                li.innerHTML = `<span class="text-red-400 mt-0.5 shrink-0">&#9679;</span><span>${r}</span>`;
                risksList.appendChild(li);
            });

            const tipsList = document.getElementById('tipsList');
            tipsList.innerHTML = '';
            (data.tips || []).forEach(t => {
                const li = document.createElement('li');
                li.className = 'flex items-start gap-2 text-gray-300';
                li.innerHTML = `<span class="text-blue-400 mt-0.5 shrink-0">&#9679;</span><span>${t}</span>`;
                tipsList.appendChild(li);
            });

            document.getElementById('results').classList.remove('hidden');
        }

        function showError(msg) {
            const el = document.getElementById('errorBlock');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
